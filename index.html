<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Avaliação do Cliente</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>Avaliação de Satisfação</h1>
<p class="subtitulo">Sua opinião nos ajuda a melhorar!</p>

<form id="formAvaliacao">

<div class="pergunta">

<h3>1. Como você avalia nosso serviço?</h3>

<label><input type="radio" name="atendimento"> Excelente</label>
<label><input type="radio" name="atendimento"> Bom</label>
<label><input type="radio" name="atendimento"> Regular</label>
<label><input type="radio" name="atendimento"> Ruim</label>
</div>

</div>

<div class="pergunta">

<h3>2. Como foi o atendimento?</h3>

<label><input type="radio" name="atendimento"> Excelente</label>
<label><input type="radio" name="atendimento"> Bom</label>
<label><input type="radio" name="atendimento"> Regular</label>
<label><input type="radio" name="atendimento"> Ruim</label>

</div>

<div class="pergunta">

<h3>3. Você recomendaria nossa empresa?</h3>

<label><input type="radio" name="recomendacao"> Sim</label>
<label><input type="radio" name="recomendacao"> Talvez</label>
<label><input type="radio" name="recomendacao"> Não</label>

</div>

<div class="pergunta">

<h3>4. Comentários ou sugestões</h3>

<textarea placeholder="Digite aqui sua opinião..."></textarea>

</div>

<button type="submit">Enviar Avaliação</button>

</form>

<p id="mensagem"></p>

</div>

<script src="script.js"></script>

</body>
</html>
